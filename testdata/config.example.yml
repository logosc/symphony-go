# symphony-go config — copy to ~/.symphony-go/config.yml and edit.
# This file lives outside the repo on purpose; the agent never sees it.

repo:
  full_name: "OWNER/REPO"
  base_branch: "main"
  local_path: "/abs/path/to/your/repo"
  workflow_file: "WORKFLOW.md"

github:
  # Each credential field has two forms — pick whichever fits:
  #   inline: token / app_id / installation_id / private_key_path / private_key_pem
  #   env:    token_env / app_id_env / installation_id_env / private_key_path_env / private_key_pem_env
  # Inline is simplest; env-named is right when the config file is shared
  # or checked in. Within each pair, set exactly one — doctor rejects both.
  #
  # PAT mode (default):
  auth: "pat"
  token_env: "GITHUB_TOKEN"   # or:  token: "ghp_..."
  #
  # GitHub App mode (uncomment + flip auth to "app"):
  # auth: "app"
  # app_id: 1234567                                              # or app_id_env: "SYMPHONY_GO_APP_ID"
  # installation_id: 12345678                                    # or installation_id_env: "SYMPHONY_GO_APP_INSTALLATION_ID"
  # private_key_path: "/abs/path/to/app.pem"                     # or private_key_path_env / private_key_pem / private_key_pem_env
  poll_interval_seconds: 30

labels:
  ready: "symphony:ready"
  planning: "symphony:planning"
  awaiting_approval: "symphony:awaiting-approval"
  implementing: "symphony:implementing"
  pr_ready: "symphony:pr-ready"
  failed: "symphony:failed"
  blocked: "symphony:blocked"
  stop: "symphony:stop"

approval:
  mode: "auto"                        # gated | auto | handoff
  command: "/symphony approve"
  require_token: false                # true = gated approvals use per-plan numeric token instead of command
  require_write_permission: true

auto:
  rules:
    - issue_labels: ["docs", "test"]
      max_plan_files_claimed: 5
      reviewer_required: false
    - issue_labels: ["safe-change"]
      max_plan_files_claimed: 10
      reviewer_required: true
    - issue_labels: []                # catch-all
      max_plan_files_claimed: 20
      reviewer_required: true
  reviewer:
    provider: "codex"                 # ideally != agent.provider
    model: ""
    timeout_seconds: 600
  fallback_on_reject: "gated"
  fallback_on_no_rule_match: "gated"
  verify_diff_matches_plan: true
  max_diff_drift_files: 2

agent:
  provider: "claude"                  # claude | codex
  model: "sonnet"
  timeout_seconds: 3600
  # Per-axis variants of provider/model (Proposal 0001 §11 question #1).
  # Mutually exclusive with the scalar `provider`/`model` above; uncomment
  # one or both maps and remove the matching scalar to use them. Each map
  # must carry a `default` key. Provider values must be `claude` or `codex`.
  #
  # provider_by_label:
  #   "type:code":     "claude"
  #   "type:research": "codex"
  #   default:         "claude"
  # model_by_label:
  #   "type:code":     "sonnet"
  #   "type:research": "gpt-5-codex"
  #   default:         "sonnet"

claude:
  max_turns: 20
  planning_tools: ["Read", "Grep", "Glob", "LS"]
  implementation_tools:
    - "Read"
    - "Edit"
    - "Write"
    - "Bash(git status:*)"
    - "Bash(git diff:*)"
    - "Bash(go test:*)"
  review_tools: ["Read", "Grep", "Glob", "LS"]
  disallowed_tools:
    - "Bash(sudo:*)"
    - "Bash(curl:*)"
    - "Bash(wget:*)"

codex:
  mode: "app-server"                  # app-server (default, recommended) | exec
  planning_args:       ["--sandbox", "read-only"]
  implementation_args: ["--sandbox", "workspace-write"]
  review_args:         ["--sandbox", "read-only"]

env:
  # Subscription mode (default): the agent inherits no API keys; the
  # orchestrator symlinks ~/.claude/ and ~/.codex/ into the agent's
  # isolated $HOME so the local CLIs see their own auth state.
  allowlist: []
  # API-key mode (uncomment if you don't want subscription auth — e.g.
  # headless server with no logged-in CLI):
  # allowlist: ["OPENAI_API_KEY", "ANTHROPIC_API_KEY"]
  block_patterns:
    - ".*TOKEN.*"
    - ".*SECRET.*"
    - ".*PASSWORD.*"
    - "AWS_.*"
    - "GCLOUD_.*"
    - "KUBECONFIG"
    - "SSH_AUTH_SOCK"

hooks:
  after_create: ""                    # e.g. "go mod download" or "npm ci"
  before_run:   ""
  after_run:    ""
  timeout_seconds: 60

validation:
  commands: ["go test ./..."]
  command_timeout_seconds: 900

orchestrator:
  # Cap on issues processed simultaneously. Default 1 (serial). Tune up
  # only after confirming your runner, hooks, and disk can sustain N
  # concurrent worktrees.
  max_concurrent_jobs: 1

audit:
  redact_patterns:
    - "sk-[A-Za-z0-9_-]+"
    - "ghp_[A-Za-z0-9_]+"
    - "ghs_[A-Za-z0-9_]+"
